<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFDAB9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg)"/>
  <rect x="0" y="250" width="400" height="50" fill="#1e8449" opacity="0.3"/>
  
  <!-- 球台 -->
  <rect x="50" y="200" width="150" height="8" fill="#1a5276" rx="2"/>
  <rect x="50" y="208" width="150" height="42" fill="#2874a6" opacity="0.5"/>
  <line x1="125" y1="200" x2="125" y2="250" stroke="white" stroke-width="2"/>
  
  <!-- 人物 - 反手推挡姿势（面向球台） -->
  <!-- 腿 -->
  <line x1="230" y1="230" x2="210" y2="250" stroke="url(#skin)" stroke-width="12" stroke-linecap="round"/>
  <line x1="250" y1="230" x2="270" y2="250" stroke="url(#skin)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- 身体 -->
  <ellipse cx="240" cy="180" rx="28" ry="48" fill="#9b59b6"/>
  
  <!-- 右臂（持拍手，贴近身体） -->
  <line x1="260" y1="160" x2="230" y2="170" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="230" y1="170" x2="200" y2="190" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 球拍 -->
  <ellipse cx="185" cy="195" rx="22" ry="28" fill="#2c3e50" transform="rotate(10, 185, 195)"/>
  <ellipse cx="185" cy="195" rx="18" ry="23" fill="#e74c3c" transform="rotate(10, 185, 195)"/>
  <rect x="175" y="215" width="7" height="28" fill="#8b4513" transform="rotate(10, 179, 229)"/>
  
  <!-- 左臂 -->
  <line x1="220" y1="160" x2="200" y2="140" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 头 -->
  <circle cx="240" cy="110" r="25" fill="url(#skin)"/>
  <circle cx="235" cy="105" r="3" fill="#2c3e50"/>
  
  <!-- 球 -->
  <circle cx="150" cy="180" r="8" fill="#f39c12"/>
  <circle cx="148" cy="178" r="2" fill="white" opacity="0.6"/>
  
  <!-- 动作线 -->
  <path d="M 220 160 Q 200 175 195 190" stroke="#f1c40f" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
  
  <!-- 文字 -->
  <text x="280" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">反手推挡</text>
  <text x="280" y="65" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Backhand Push</text>
  
  <!-- 关键点 -->
  <circle cx="230" cy="170" r="4" fill="#e74c3c"/>
  <text x="240" y="165" font-size="10" fill="white">肘贴身体</text>
</svg>