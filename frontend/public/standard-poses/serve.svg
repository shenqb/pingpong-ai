<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFDAB9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg)"/>
  <rect x="0" y="250" width="400" height="50" fill="#922b21" opacity="0.3"/>
  
  <!-- 球台（发球方视角） -->
  <rect x="200" y="180" width="180" height="6" fill="#1a5276" rx="2"/>
  <rect x="200" y="186" width="180" height="64" fill="#2874a6" opacity="0.4"/>
  <line x1="290" y1="180" x2="290" y2="250" stroke="white" stroke-width="2"/>
  <line x1="200" y1="180" x2="380" y2="180" stroke="white" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- 人物 - 发球姿势 -->
  <!-- 左手抛球 -->
  <line x1="160" y1="140" x2="160" y2="80" stroke="url(#skin)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="160" cy="70" r="12" fill="url(#skin)"/>
  
  <!-- 球（抛起） -->
  <circle cx="160" cy="45" r="8" fill="#f39c12"/>
  <circle cx="158" cy="43" r="2" fill="white" opacity="0.6"/>
  
  <!-- 身体 -->
  <ellipse cx="180" cy="175" rx="25" ry="45" fill="#34495e"/>
  
  <!-- 右臂（引拍） -->
  <line x1="200" y1="155" x2="240" y2="170" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="240" y1="170" x2="260" y2="200" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 球拍 -->
  <ellipse cx="265" cy="215" rx="20" ry="25" fill="#2c3e50" transform="rotate(45, 265, 215)"/>
  <ellipse cx="265" cy="215" rx="16" ry="20" fill="#27ae60" transform="rotate(45, 265, 215)"/>
  <rect x="255" y="232" width="6" height="25" fill="#8b4513" transform="rotate(45, 258, 245)"/>
  
  <!-- 腿 -->
  <line x1="165" y1="220" x2="150" y2="250" stroke="url(#skin)" stroke-width="12" stroke-linecap="round"/>
  <line x1="195" y1="220" x2="210" y2="250" stroke="url(#skin)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- 头 -->
  <circle cx="180" cy="115" r="22" fill="url(#skin)"/>
  <circle cx="175" cy="110" r="3" fill="#2c3e50"/>
  
  <!-- 文字 -->
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">发球</text>
  <text x="30" y="65" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Serve</text>
  
  <!-- 关键点 -->
  <circle cx="160" cy="45" r="4" fill="#f1c40f"/>
  <text x="145" y="35" font-size="10" fill="white">抛球16cm+</text>
  
  <circle cx="240" cy="170" r="4" fill="#f1c40f"/>
  <text x="250" y="165" font-size="10" fill="white">手腕抖动</text>
</svg>