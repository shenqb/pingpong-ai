<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e67e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFDAB9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg)"/>
  <rect x="0" y="250" width="400" height="50" fill="#d35400" opacity="0.3"/>
  
  <!-- 球台 -->
  <rect x="280" y="200" width="120" height="8" fill="#1a5276" rx="2"/>
  <rect x="280" y="208" width="120" height="42" fill="#2874a6" opacity="0.5"/>
  
  <!-- 人物 - 正手拉弧圈姿势（大幅后仰蓄力） -->
  <!-- 腿（弯曲） -->
  <line x1="150" y1="235" x2="120" y2="250" stroke="url(#skin)" stroke-width="12" stroke-linecap="round"/>
  <line x1="180" y1="235" x2="200" y2="250" stroke="url(#skin)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- 身体（后仰） -->
  <ellipse cx="165" cy="175" rx="28" ry="55" fill="#e74c3c" transform="rotate(-15, 165, 175)"/>
  
  <!-- 右臂（大幅后引） -->
  <line x1="185" y1="145" x2="230" y2="110" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="230" y1="110" x2="280" y2="130" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 球拍 -->
  <ellipse cx="295" cy="140" rx="22" ry="28" fill="#2c3e50" transform="rotate(-30, 295, 140)"/>
  <ellipse cx="295" cy="140" rx="18" ry="23" fill="#3498db" transform="rotate(-30, 295, 140)"/>
  <rect x="285" y="160" width="7" height="28" fill="#8b4513" transform="rotate(-30, 289, 174)"/>
  
  <!-- 左臂 -->
  <line x1="145" y1="155" x2="110" y2="170" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 头 -->
  <circle cx="165" cy="105" r="25" fill="url(#skin)"/>
  <circle cx="170" cy="100" r="3" fill="#2c3e50"/>
  
  <!-- 弧线球轨迹 -->
  <path d="M 310 150 Q 350 100 380 160" stroke="#f1c40f" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  <polygon points="380,160 370,155 375,165" fill="#f1c40f"/>
  
  <!-- 球 -->
  <circle cx="310" cy="150" r="8" fill="#f39c12"/>
  <circle cx="308" cy="148" r="2" fill="white" opacity="0.6"/>
  
  <!-- 文字 -->
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">正手拉弧圈</text>
  <text x="30" y="65" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Forehand Loop</text>
  
  <!-- 关键点 -->
  <circle cx="230" cy="110" r="4" fill="#e74c3c"/>
  <text x="220" y="95" font-size="10" fill="white">大臂后引</text>
  
  <circle cx="165" cy="175" r="4" fill="#e74c3c"/>
  <text x="95" y="180" font-size="10" fill="white">转腰蓄力</text>
</svg>