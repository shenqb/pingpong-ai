<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a569bd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#af7ac5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFDAB9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg)"/>
  <rect x="0" y="250" width="400" height="50" fill="#7d3c98" opacity="0.3"/>
  
  <!-- 球台（近台） -->
  <rect x="100" y="200" width="200" height="6" fill="#1a5276" rx="2"/>
  <rect x="100" y="206" width="200" height="44" fill="#2874a6" opacity="0.4"/>
  <line x1="200" y1="200" x2="200" y2="250" stroke="white" stroke-width="2"/>
  
  <!-- 人物 - 挑打姿势（前倾，手臂伸入台内） -->
  <!-- 身体（前倾） -->
  <ellipse cx="280" cy="180" rx="25" ry="42" fill="#5dade2" transform="rotate(15, 280, 180)"/>
  
  <!-- 右臂（伸入台内） -->
  <line x1="295" y1="155" x2="240" y2="170" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="240" y1="170" x2="190" y2="190" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 球拍（小巧） -->
  <ellipse cx="178" cy="195" rx="18" ry="22" fill="#2c3e50" transform="rotate(30, 178, 195)"/>
  <ellipse cx="178" cy="195" rx="14" ry="18" fill="#e74c3c" transform="rotate(30, 178, 195)"/>
  <rect x="172" y="212" width="5" height="22" fill="#8b4513" transform="rotate(30, 175, 223)"/>
  
  <!-- 左臂 -->
  <line x1="265" y1="160" x2="300" y2="145" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 腿（前跨） -->
  <line x1="265" y1="220" x2="240" y2="250" stroke="url(#skin)" stroke-width="12" stroke-linecap="round"/>
  <line x1="295" y1="220" x2="320" y2="250" stroke="url(#skin)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- 头 -->
  <circle cx="280" cy="120" r="22" fill="url(#skin)"/>
  <circle cx="285" cy="115" r="3" fill="#2c3e50"/>
  
  <!-- 球（来球） -->
  <circle cx="150" cy="185" r="8" fill="#f39c12"/>
  <circle cx="148" cy="183" r="2" fill="white" opacity="0.6"/>
  
  <!-- 快速动作线 -->
  <path d="M 240 170 L 190 190" stroke="#f1c40f" stroke-width="3" stroke-dasharray="3,3"/>
  <polygon points="190,190 195,182 185,185" fill="#f1c40f"/>
  
  <!-- 文字 -->
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">挑打</text>
  <text x="30" y="65" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Flick</text>
  
  <!-- 关键点 -->
  <circle cx="190" cy="190" r="4" fill="#f1c40f"/>
  <text x="160" y="210" font-size="10" fill="white">手腕抖动</text>
  
  <circle cx="240" cy="170" r="4" fill="#f1c40f"/>
  <text x="225" y="158" font-size="10" fill="white">伸入台内</text>
</svg>