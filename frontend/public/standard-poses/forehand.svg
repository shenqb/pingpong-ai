<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFDAB9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- 地板 -->
  <rect x="0" y="250" width="400" height="50" fill="#2d1b4e" opacity="0.3"/>
  
  <!-- 球台（简化） -->
  <rect x="300" y="200" width="100" height="8" fill="#1a5276" rx="2"/>
  <rect x="300" y="208" width="100" height="42" fill="#2874a6" opacity="0.5"/>
  <line x1="350" y1="200" x2="350" y2="250" stroke="white" stroke-width="2"/>
  
  <!-- 人物 - 正手攻球姿势 -->
  <!-- 腿 -->
  <line x1="160" y1="230" x2="140" y2="250" stroke="url(#skin)" stroke-width="12" stroke-linecap="round"/>
  <line x1="180" y1="230" x2="200" y2="250" stroke="url(#skin)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- 身体 -->
  <ellipse cx="170" cy="180" rx="30" ry="50" fill="#3498db"/>
  
  <!-- 左臂（持拍手，伸展） -->
  <line x1="190" y1="160" x2="240" y2="140" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="240" y1="140" x2="280" y2="170" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 球拍 -->
  <ellipse cx="295" cy="175" rx="25" ry="30" fill="#2c3e50" transform="rotate(-20, 295, 175)"/>
  <ellipse cx="295" cy="175" rx="20" ry="25" fill="#e74c3c" transform="rotate(-20, 295, 175)"/>
  <rect x="275" y="195" width="8" height="30" fill="#8b4513" transform="rotate(-20, 279, 210)"/>
  
  <!-- 右臂 -->
  <line x1="150" y1="160" x2="120" y2="180" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 头 -->
  <circle cx="170" cy="110" r="25" fill="url(#skin)"/>
  
  <!-- 眼睛 -->
  <circle cx="175" cy="105" r="3" fill="#2c3e50"/>
  
  <!-- 球 -->
  <circle cx="320" cy="160" r="8" fill="#f39c12"/>
  <circle cx="318" cy="158" r="2" fill="white" opacity="0.6"/>
  
  <!-- 动作箭头 -->
  <path d="M 240 200 Q 260 180 280 195" stroke="#f1c40f" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
  <polygon points="280,195 275,185 285,188" fill="#f1c40f"/>
  
  <!-- 文字 -->
  <text x="50" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">正手攻球</text>
  <text x="50" y="65" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Forehand Drive</text>
  
  <!-- 关键点标注 -->
  <circle cx="240" cy="140" r="4" fill="#e74c3c"/>
  <text x="230" y="125" font-size="10" fill="white">肘关节 90°</text>
  
  <circle cx="170" cy="180" r="4" fill="#e74c3c"/>
  <text x="100" y="185" font-size="10" fill="white">重心前倾</text>
</svg>